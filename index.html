<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title> 
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pokedex</h1>
    
    <div class="pokecontainer" id="pokecontainer">
        <div class="card">
            <div class="img">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" alt="Bulbassauro">
            </div>
            <div class="info">
                <span class="num"> #1 </span>
                <h2 class="nome" >Bulbassauro</h2>
                <small class="Tipo">Tipo: <span> Planta </span></small>
            </div>
        </div>

        <div class="card">

    </div>
    
    <script src="script.js"></script>
</body>
</html>
